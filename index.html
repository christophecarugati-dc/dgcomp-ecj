<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DG COMP Decisions &harr; ECJ/GC Court Cases</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f9fa;color:#1a1a2e;font-size:14px;line-height:1.5;padding:12px}
.header{text-align:center;margin-bottom:16px}
.header h1{font-size:20px;font-weight:700;color:#003399;letter-spacing:-0.3px}
.header p{font-size:12px;color:#666;margin-top:2px}
.search-bar{display:flex;gap:8px;margin-bottom:10px}
.search-bar input{flex:1;padding:10px 14px;border:1.5px solid #d0d5dd;border-radius:8px;font-size:14px;outline:none}
.search-bar input:focus{border-color:#003399}
.search-bar button{padding:10px 18px;background:#003399;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.search-bar button:hover{background:#002266}
.search-bar select{padding:10px;border:1.5px solid #d0d5dd;border-radius:8px;font-size:13px;background:#fff}
#quickFilters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pill{padding:5px 12px;border-radius:20px;border:1px solid #d0d5dd;background:#fff;font-size:12px;cursor:pointer;transition:all 0.15s}
.pill:hover{background:#e8eef6;border-color:#003399}
.pill.active{background:#003399;color:#fff;border-color:#003399}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#e8eef6;border-radius:6px;margin-bottom:10px;font-size:12px;color:#003399}
#debugBar{padding:8px 12px;background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:6px;font-size:12px;margin-bottom:10px;word-break:break-all}
.decision{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:6px;background:#fff;overflow:hidden;transition:box-shadow 0.2s}
.decision:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.decision.expanded{border-color:#003399;box-shadow:0 2px 12px rgba(0,51,153,0.1)}
.decision-row{display:flex;align-items:flex-start;gap:10px;padding:12px;cursor:pointer}
.expand-arrow{font-size:10px;color:#999;margin-top:4px;flex-shrink:0;transition:transform 0.2s}
.expanded .expand-arrow{transform:rotate(90deg);color:#003399}
.case-num{font-weight:700;font-size:12px;color:#003399;white-space:nowrap;min-width:85px;margin-top:2px}
.decision-info{flex:1;min-width:0}
.decision-title{font-weight:600;font-size:14px;margin-bottom:4px}
.decision-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:#666}
.tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-cartel{background:#fce4ec;color:#c62828}
.tag-antitrust{background:#e3f2fd;color:#1565c0}
.tag-lb{background:#f3e5f5;color:#6a1b9a}
.comp-link{color:#003399;text-decoration:none;font-weight:600;font-size:11px}
.comp-link:hover{text-decoration:underline}
.case-law-panel{padding:12px 16px;background:#f0f4ff;border-top:1px solid #e0e7ff}
.panel-header{font-weight:700;font-size:13px;color:#003399;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.court-case{padding:10px 12px;background:#fff;border:1px solid #e0e7ff;border-radius:6px;margin-bottom:6px}
.court-title{font-weight:600;font-size:13px;color:#1a1a2e;margin-bottom:4px}
.court-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;color:#666;align-items:center}
.court-celex{font-weight:700;color:#003399}
.court-type{padding:1px 6px;background:#e8f5e9;color:#2e7d32;border-radius:3px;font-weight:600}
.eurlex-link{color:#003399;text-decoration:none;font-weight:600}
.eurlex-link:hover{text-decoration:underline}
.case-loading{display:flex;align-items:center;gap:8px;color:#666;font-size:13px;padding:8px 0}
.mini-spinner{width:16px;height:16px;border:2px solid #e0e7ff;border-top:2px solid #003399;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.no-cases{color:#888;font-size:13px;font-style:italic;padding:8px 0}
.error-box{color:#c62828;background:#fce4ec;padding:8px 12px;border-radius:6px;font-size:12px}
.empty{text-align:center;padding:40px 20px;color:#888}
.empty-icon{font-size:40px;margin-bottom:12px}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:16px;flex-wrap:wrap}
.page-btn{padding:6px 12px;border:1px solid #d0d5dd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px}
.page-btn:hover{background:#e8eef6}
.page-btn.active{background:#003399;color:#fff;border-color:#003399}
.page-btn:disabled{opacity:0.4;cursor:default}
.loading-box{text-align:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid #e0e7ff;border-top:3px solid #003399;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
.footer{text-align:center;padding:12px;font-size:11px;color:#999;margin-top:16px;border-top:1px solid #eee}
.footer a{color:#003399;text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="header">
  <h1>DG COMP Decisions &harr; Court Cases</h1>
  <p><span id="totalCount">0</span> antitrust &amp; cartel decisions &middot; linked to ECJ/General Court via EU CELLAR SPARQL</p>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search cases, companies, case numbers&hellip;">
  <select id="typeFilter">
    <option value="">All types</option>
    <option value="Antitrust">Antitrust</option>
    <option value="Cartel">Cartel</option>
  </select>
  <button id="btnSearch">Search</button>
</div>
<div id="quickFilters"></div>

<div id="debugBar">Loading case data&hellip;</div>

<div id="statusBar" class="status-bar" style="display:none;"></div>

<div id="loadingBox" class="loading-box">
  <div class="spinner"></div>
  <div>Loading DG COMP decisions&hellip;</div>
</div>

<div id="results"></div>

<div class="footer">
  Decisions: <a href="https://data.europa.eu" target="_blank">DG COMP Open Data</a> &middot;
  Court cases: <a href="https://publications.europa.eu/en/web/cellar" target="_blank">EU CELLAR SPARQL</a> &middot;
  <a href="https://www.digital-competition.com" target="_blank">digital-competition.com</a>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// DG COMP ↔ ECJ/GC Case Linker — GitHub Pages Edition
//
// Hosted externally, so fetch() works without Wix sandbox issues.
// Cases loaded from cases.json in same directory.
// Court cases queried from EU CELLAR via CORS proxy.
// ═══════════════════════════════════════════════════════════════════

// SPARQL endpoints — tried in order until one works
var CELLAR_BASE = "https://publications.europa.eu/webapi/rdf/sparql";

function cellarUrl(query) {
  return CELLAR_BASE + "?query=" + encodeURIComponent(query)
    + "&format=" + encodeURIComponent("application/sparql-results+json");
}

var SPARQL_ENDPOINTS = [
  {
    name: "AllOrigins Proxy",
    makeUrl: function(query) {
      return "https://api.allorigins.win/raw?url=" + encodeURIComponent(cellarUrl(query));
    },
    parseResponse: function(text) { return JSON.parse(text); }
  },
  {
    name: "CELLAR Direct",
    makeUrl: function(query) { return cellarUrl(query); },
    parseResponse: function(text) { return JSON.parse(text); }
  }
];

var QUICK = ["Google","Apple","Microsoft","Intel","Qualcomm","Amazon","Meta","cartel","abuse","Art. 102","Art. 101"];
var PAGE_SIZE = 40;
var allCases = [];
var filtered = [];
var expandedCase = null;
var caseLawCache = {};
var caseLoadingSet = {};
var currentPage = 0;
var workingEndpoint = -1;

function $(id) { return document.getElementById(id); }

// ——— Quick filter pills ———
QUICK.forEach(function(term) {
  var p = document.createElement("button");
  p.className = "pill";
  p.textContent = term;
  p.addEventListener("click", function() { $("searchInput").value = term; doFilter(); });
  $("quickFilters").appendChild(p);
});
$("btnSearch").addEventListener("click", doFilter);
$("searchInput").addEventListener("keydown", function(e) { if (e.key === "Enter") doFilter(); });
$("typeFilter").addEventListener("change", doFilter);

// ——— Load case data from cases.json (same directory) ———
function loadCaseData() {
  $("debugBar").textContent = "Fetching cases.json\u2026";
  fetch("cases.json")
    .then(function(resp) {
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.json();
    })
    .then(function(data) {
      if (Array.isArray(data)) {
        allCases = data;
      } else if (data && Array.isArray(data.data)) {
        allCases = data.data;
      } else {
        throw new Error("Unexpected JSON structure");
      }
      if (!allCases.length) throw new Error("No cases found");

      $("totalCount").textContent = allCases.length;
      $("loadingBox").style.display = "none";
      showDebug("success", "Loaded " + allCases.length + " DG COMP decisions");
      filtered = allCases;
      render();
    })
    .catch(function(err) {
      showDebug("error", "Failed to load cases: " + err.message);
      $("loadingBox").innerHTML = '<div class="empty"><div class="empty-icon">&#9888;</div>'
        + '<h2>Could not load case data</h2><p>' + h(err.message) + '</p>'
        + '<p style="margin-top:8px;font-size:12px;color:#666;">Make sure cases.json is in the same directory as index.html</p></div>';
    });
}

// ——— SPARQL query builder ———
function buildCourtQuery(caseNumber, caseTitle, companies) {
  var cleanNum = caseNumber ? caseNumber.replace(/^AT\./, "").replace(/^COMP\//, "") : "";
  var searchTerms = [];

  if (companies && companies.length > 0) {
    companies.forEach(function(c) {
      var words = c.split(/[\s,\/\(\)]+/).filter(function(w) { return w.length > 3; });
      if (words.length > 0) searchTerms.push(words[0].toLowerCase().replace(/"/g, ""));
    });
  }
  if (caseTitle) {
    var tw = caseTitle.split(/[\s\/\(\)\-]+/).filter(function(w) {
      return w.length > 3 && ["case","commission","the","and","for","with"].indexOf(w.toLowerCase()) === -1;
    });
    if (tw.length > 0) searchTerms.push(tw[0].toLowerCase().replace(/"/g, ""));
  }

  var seen = {};
  searchTerms = searchTerms.filter(function(t) { if (seen[t]) return false; seen[t] = true; return true; });
  if (searchTerms.length === 0 && !cleanNum) return null;

  var filters = [];
  if (cleanNum) filters.push('CONTAINS(STR(?courtTitle), "' + cleanNum + '")');
  searchTerms.forEach(function(term) {
    filters.push('(CONTAINS(LCASE(STR(?courtTitle)), "' + term + '") && CONTAINS(LCASE(STR(?courtTitle)), "commission"))');
  });

  return 'PREFIX cdm: <http://publications.europa.eu/ontology/cdm#>\n'
    + 'SELECT DISTINCT ?courtCelex ?courtTitle ?courtDate ?courtType WHERE {\n'
    + '  ?courtWork cdm:work_has_resource-type ?type .\n'
    + '  FILTER(?type IN (\n'
    + '    <http://publications.europa.eu/resource/authority/resource-type/JUDG>,\n'
    + '    <http://publications.europa.eu/resource/authority/resource-type/ORDER>,\n'
    + '    <http://publications.europa.eu/resource/authority/resource-type/OPIN_AG>,\n'
    + '    <http://publications.europa.eu/resource/authority/resource-type/VIEW_AG>\n'
    + '  ))\n'
    + '  ?courtExpr cdm:expression_belongs_to_work ?courtWork .\n'
    + '  ?courtExpr cdm:expression_uses_language <http://publications.europa.eu/resource/authority/language/ENG> .\n'
    + '  ?courtExpr cdm:expression_title ?courtTitle .\n'
    + '  FILTER(' + filters.join(" || ") + ')\n'
    + '  OPTIONAL { ?courtWork cdm:resource_legal_id_celex ?courtCelex . }\n'
    + '  OPTIONAL { ?courtWork cdm:work_date_document ?courtDate . }\n'
    + '  OPTIONAL { ?courtWork cdm:work_has_resource-type ?courtTypeURI .\n'
    + '    BIND(\n'
    + '      IF(?courtTypeURI = <http://publications.europa.eu/resource/authority/resource-type/JUDG>, "Judgment",\n'
    + '      IF(?courtTypeURI = <http://publications.europa.eu/resource/authority/resource-type/ORDER>, "Order",\n'
    + '      IF(?courtTypeURI = <http://publications.europa.eu/resource/authority/resource-type/OPIN_AG>, "AG Opinion",\n'
    + '      IF(?courtTypeURI = <http://publications.europa.eu/resource/authority/resource-type/VIEW_AG>, "AG View",\n'
    + '      "Other")))) AS ?courtType\n'
    + '    )\n'
    + '  }\n'
    + '}\n'
    + 'ORDER BY DESC(?courtDate)\n'
    + 'LIMIT 50';
}

// ——— SPARQL execution with fallback endpoints ———
function executeSparql(query, idx) {
  if (typeof idx === "undefined") {
    idx = workingEndpoint >= 0 ? workingEndpoint : 0;
  }
  if (idx >= SPARQL_ENDPOINTS.length) {
    return Promise.reject(new Error("All " + SPARQL_ENDPOINTS.length + " SPARQL endpoints failed. Check browser console (F12) for details."));
  }

  var ep = SPARQL_ENDPOINTS[idx];
  var url = ep.makeUrl(query);
  console.log("Trying endpoint " + idx + " (" + ep.name + "):", url.substring(0, 120) + "...");

  return fetch(url, {
    method: "GET",
    headers: { "Accept": "application/sparql-results+json" }
  })
  .then(function(response) {
    if (!response.ok) throw new Error(ep.name + " HTTP " + response.status);
    return response.text();
  })
  .then(function(rawText) {
    if (!rawText || rawText.trim().length === 0) throw new Error(ep.name + " returned empty response");
    var data;
    try { data = ep.parseResponse(rawText); }
    catch(e) { throw new Error(ep.name + " bad JSON: " + rawText.substring(0, 120)); }
    if (!data.results || !data.results.bindings) throw new Error(ep.name + " unexpected structure");

    workingEndpoint = idx;
    console.log("SUCCESS via " + ep.name + ": " + data.results.bindings.length + " results");
    return data.results.bindings.map(function(b) {
      var row = {};
      Object.keys(b).forEach(function(k) { row[k] = b[k].value; });
      return row;
    });
  })
  .catch(function(err) {
    console.warn("Endpoint " + idx + " (" + ep.name + ") failed:", err.message);
    return executeSparql(query, idx + 1);
  });
}

// ——— Fetch court cases for a DG COMP decision ———
function fetchCourtCases(caseNum) {
  var c = null;
  for (var i = 0; i < allCases.length; i++) {
    if (allCases[i].n === caseNum) { c = allCases[i]; break; }
  }
  if (!c) return;

  caseLoadingSet[caseNum] = true;
  render();

  var query = buildCourtQuery(caseNum, c.t || "", c.c || []);
  if (!query) {
    delete caseLoadingSet[caseNum];
    caseLawCache[caseNum] = [];
    render();
    return;
  }

  executeSparql(query)
    .then(function(rows) {
      var seen = {};
      var unique = [];
      rows.forEach(function(r) {
        var key = r.courtCelex || r.courtTitle;
        if (!seen[key]) { seen[key] = true; unique.push(r); }
      });
      delete caseLoadingSet[caseNum];
      caseLawCache[caseNum] = unique;
      if (workingEndpoint >= 0) {
        console.log("SPARQL via " + SPARQL_ENDPOINTS[workingEndpoint].name + " \u2192 " + unique.length + " court cases");
      }
      render();
    })
    .catch(function(err) {
      delete caseLoadingSet[caseNum];
      caseLawCache[caseNum] = { error: err.message };
      render();
    });
}

// ——— Filter & Search ———
function doFilter() {
  var q = $("searchInput").value.trim().toLowerCase();
  var type = $("typeFilter").value;
  currentPage = 0;
  expandedCase = null;

  document.querySelectorAll(".pill").forEach(function(p) {
    p.classList.toggle("active", q && p.textContent.toLowerCase() === q);
  });

  filtered = allCases.filter(function(c) {
    if (type && c.ct !== type) return false;
    if (!q) return true;
    return [c.n, c.t, c.ct, c.lb].concat(c.c || []).join(" ").toLowerCase().indexOf(q) !== -1;
  });
  render();
}

// ——— Render ———
function render() {
  $("statusBar").style.display = filtered.length > 0 ? "flex" : "none";
  $("statusBar").innerHTML = '<span><strong>' + filtered.length + '</strong> cases</span>'
    + '<span style="color:#666;font-style:italic;">Click a row \u2192 find linked ECJ/GC cases via CELLAR SPARQL</span>';

  if (filtered.length === 0 && allCases.length > 0) {
    $("results").innerHTML = '<div class="empty"><div class="empty-icon">&#128269;</div><h2>No matching cases</h2><p>Try a different search term or clear the type filter.</p></div>';
    return;
  }

  var start = currentPage * PAGE_SIZE;
  var page = filtered.slice(start, start + PAGE_SIZE);
  var html = "";

  page.forEach(function(c) {
    var isExp = expandedCase === c.n;
    var cases = caseLawCache[c.n];
    var isLoading = !!caseLoadingSet[c.n];
    var caseArr = Array.isArray(cases) ? cases : [];
    var hasErr = cases && cases.error;

    html += '<div class="decision ' + (isExp ? "expanded" : "") + '">';
    html += '<div class="decision-row" onclick="toggleExpand(\'' + esc(c.n) + '\')">';
    html += '<div class="expand-arrow">&#9654;</div>';
    html += '<div class="case-num">' + h(c.n) + '</div>';
    html += '<div class="decision-info">';
    html += '<div class="decision-title">' + h(c.t) + '</div>';
    html += '<div class="decision-meta">';
    if (c.d) html += '<span>' + fmtDate(c.d) + '</span>';
    html += '<span class="tag ' + (c.ct === "Cartel" ? "tag-cartel" : "tag-antitrust") + '">' + h(c.ct) + '</span>';
    if (c.lb) html += '<span class="tag tag-lb">' + h(c.lb) + '</span>';
    if (c.c && c.c.length > 0) html += '<span>' + h(c.c.slice(0, 3).join(", ")) + (c.c.length > 3 ? "\u2026" : "") + '</span>';
    html += '<a class="comp-link" href="https://competition-cases.ec.europa.eu/cases/' + encodeURIComponent(c.n) + '" target="_blank" onclick="event.stopPropagation()">DG COMP &#8599;</a>';
    if (caseArr.length > 0) html += '<span style="color:#2e7d32;font-weight:600;">' + caseArr.length + ' court case' + (caseArr.length !== 1 ? 's' : '') + '</span>';
    html += '</div></div></div>';

    if (isExp) {
      html += '<div class="case-law-panel">';
      html += '<div class="panel-header"><span>&#9878;</span> Linked ECJ / General Court Cases</div>';
      if (isLoading) {
        html += '<div class="case-loading"><div class="mini-spinner"></div>Querying EU CELLAR for court judgments&hellip;</div>';
      } else if (hasErr) {
        html += '<div class="error-box">' + h(cases.error) + '</div>';
      } else if (caseArr.length === 0) {
        html += '<div class="no-cases">No linked court cases found. The decision may not have been challenged, or court case titles may not contain matching identifiers.</div>';
      } else {
        caseArr.forEach(function(cc) {
          html += '<div class="court-case">';
          html += '<div class="court-title">' + h(cc.courtTitle || cc.courtCelex || "Court case") + '</div>';
          html += '<div class="court-meta">';
          if (cc.courtCelex) html += '<span class="court-celex">' + h(cc.courtCelex) + '</span>';
          if (cc.courtDate) html += '<span>' + fmtDate(cc.courtDate) + '</span>';
          if (cc.courtType && cc.courtType !== "Other") html += '<span class="court-type">' + h(cc.courtType) + '</span>';
          if (cc.courtCelex) html += '<a class="eurlex-link" href="https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:' + encodeURIComponent(cc.courtCelex) + '" target="_blank">EUR-Lex &#8599;</a>';
          html += '</div></div>';
        });
      }
      html += '</div>';
    }
    html += '</div>';
  });

  // Pagination
  var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages > 1) {
    html += '<div class="pagination">';
    html += '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage === 0 ? "disabled" : "") + '>&larr; Prev</button>';
    var s = Math.max(0, currentPage - 4);
    var e = Math.min(totalPages, s + 9);
    for (var i = s; i < e; i++) {
      html += '<button class="page-btn ' + (i === currentPage ? "active" : "") + '" onclick="goPage(' + i + ')">' + (i + 1) + '</button>';
    }
    if (e < totalPages) html += '<span style="color:#aaa;font-size:11px;">&hellip; ' + totalPages + '</span>';
    html += '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages - 1 ? "disabled" : "") + '>Next &rarr;</button>';
    html += '</div>';
  }

  $("results").innerHTML = html;
}

function goPage(p) {
  var tp = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 0 || p >= tp) return;
  currentPage = p;
  expandedCase = null;
  render();
  window.scrollTo(0, 0);
}

function toggleExpand(caseNum) {
  if (expandedCase === caseNum) {
    expandedCase = null;
  } else {
    expandedCase = caseNum;
    if (!caseLawCache[caseNum]) {
      fetchCourtCases(caseNum);
    }
  }
  render();
}

// ——— Utilities ———
function h(s) { return s ? String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : ""; }
function esc(s) { return s ? s.replace(/'/g, "\\'") : ""; }
function fmtDate(d) {
  try { return new Date(d).toLocaleDateString("en-GB", { year: "numeric", month: "short", day: "numeric" }); }
  catch(e) { return d; }
}
function showDebug(type, msg) {
  var d = $("debugBar");
  d.textContent = (type === "success" ? "\u2713 " : type === "error" ? "\u2717 " : "") + msg;
  if (type === "success") {
    d.style.background = "#e8f5e9"; d.style.color = "#1b5e20"; d.style.borderColor = "#c8e6c9";
    setTimeout(function() { d.style.display = "none"; }, 4000);
  } else if (type === "error") {
    d.style.background = "#fce4e4"; d.style.color = "#8b1a1a"; d.style.borderColor = "#f5c6cb";
  }
}

// ——— Start ———
loadCaseData();
</script>
</body>
</html>

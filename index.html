<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DG COMP Decisions - ECJ/GC Court Cases</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f5f0;color:#1a1a2e;font-size:14px;line-height:1.6;padding:16px;max-width:1200px;margin:0 auto}

.header{text-align:center;margin-bottom:20px;padding:24px 0 16px}
.header h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:#1a1a2e;letter-spacing:-0.5px}
.header p{font-size:13px;color:#888;margin-top:4px}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:14px 16px;text-align:center}
.stat-num{font-family:'DM Serif Display',serif;font-size:28px;color:#003399;line-height:1}
.stat-label{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}

.search-bar{display:flex;gap:8px;margin-bottom:10px}
.search-bar input{flex:1;padding:11px 16px;border:1.5px solid #d8d8d0;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;transition:border 0.2s}
.search-bar input:focus{border-color:#003399}
.search-bar button{padding:11px 20px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;transition:background 0.2s}
.search-bar button:hover{background:#003399}
.search-bar select{padding:11px;border:1.5px solid #d8d8d0;border-radius:10px;font-size:13px;background:#fff;font-family:'DM Sans',sans-serif;cursor:pointer}

#quickFilters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{padding:5px 14px;border-radius:20px;border:1px solid #d8d8d0;background:#fff;font-size:12px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.pill:hover{background:#eef0f8;border-color:#003399}
.pill.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}

.status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#eef0f8;border-radius:8px;margin-bottom:12px;font-size:12px;color:#003399}

#debugBar{padding:8px 14px;background:#fef9e7;color:#856404;border:1px solid #f0e6b8;border-radius:8px;font-size:12px;margin-bottom:12px}

.decision{border:1px solid #e8e8e4;border-radius:10px;margin-bottom:8px;background:#fff;overflow:hidden;transition:all 0.2s}
.decision:hover{box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.decision.expanded{border-color:#003399;box-shadow:0 4px 20px rgba(0,51,153,0.08)}

.decision-row{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer}
.expand-arrow{font-size:10px;color:#bbb;margin-top:5px;flex-shrink:0;transition:transform 0.2s}
.expanded .expand-arrow{transform:rotate(90deg);color:#003399}
.case-num{font-weight:700;font-size:12px;color:#003399;white-space:nowrap;min-width:90px;margin-top:2px;font-family:'DM Sans',sans-serif}
.decision-info{flex:1;min-width:0}
.decision-title{font-weight:600;font-size:14px;margin-bottom:4px;color:#1a1a2e}
.decision-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:#888}
.tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.tag-cartel{background:#fce4ec;color:#c62828}
.tag-antitrust{background:#e3f2fd;color:#1565c0}
.tag-lb{background:#f3e5f5;color:#6a1b9a}
.comp-link{color:#003399;text-decoration:none;font-weight:600;font-size:11px}
.comp-link:hover{text-decoration:underline}

.case-law-panel{padding:14px 18px;background:#fafaf6;border-top:1px solid #e8e8e4}
.panel-header{font-family:'DM Serif Display',serif;font-size:15px;color:#1a1a2e;margin-bottom:12px}

/* Court cases from SPARQL */
.court-case{padding:10px 14px;background:#fff;border:1px solid #e8e8e4;border-radius:8px;margin-bottom:6px}
.court-title{font-weight:600;font-size:13px;color:#1a1a2e;margin-bottom:4px}
.court-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;color:#888;align-items:center}
.court-celex{font-weight:700;color:#003399}
.eurlex-link{color:#003399;text-decoration:none;font-weight:600}
.eurlex-link:hover{text-decoration:underline}
.case-loading{display:flex;align-items:center;gap:8px;color:#888;font-size:13px;padding:8px 0}
.mini-spinner{width:16px;height:16px;border:2px solid #e8e8e4;border-top:2px solid #003399;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.no-cases{color:#999;font-size:13px;padding:8px 0}

/* InfoCuria links */
.court-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.court-link-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:600;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.court-link-btn.primary{background:#1a1a2e;color:#fff}
.court-link-btn.primary:hover{background:#003399}
.court-link-btn.secondary{background:#fff;color:#003399;border:1.5px solid #d8d8d0}
.court-link-btn.secondary:hover{border-color:#003399;background:#eef0f8}

/* Case summary */
.case-summary{margin-top:10px;padding:12px 14px;background:#fff;border:1px solid #e8e8e4;border-radius:8px;font-size:13px;color:#444;line-height:1.6}
.case-summary h4{font-size:12px;color:#003399;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}

.error-box{color:#c62828;background:#fce4ec;padding:8px 14px;border-radius:8px;font-size:12px}

.empty{text-align:center;padding:40px 20px;color:#999}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:18px;flex-wrap:wrap}
.page-btn{padding:7px 14px;border:1px solid #d8d8d0;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.page-btn:hover{background:#eef0f8}
.page-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.page-btn:disabled{opacity:0.3;cursor:default}
.loading-box{text-align:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid #e8e8e4;border-top:3px solid #003399;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
.footer{text-align:center;padding:16px;font-size:11px;color:#aaa;margin-top:20px;border-top:1px solid #e8e8e4}
.footer a{color:#003399;text-decoration:none}
.footer a:hover{text-decoration:underline}
.sep{margin:0 4px;color:#ccc}
</style>
</head>
<body>

<div class="header">
  <h1>DG COMP Decisions &#8596; Court Cases</h1>
  <p>EU competition decisions linked to ECJ &amp; General Court case law</p>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search by case number, company, keyword...">
  <select id="typeFilter">
    <option value="">All types</option>
    <option value="Antitrust">Antitrust</option>
    <option value="Cartel">Cartel</option>
  </select>
  <button id="btnSearch">Search</button>
</div>
<div id="quickFilters"></div>

<div id="debugBar">Loading...</div>
<div id="statusBar" class="status-bar" style="display:none;"></div>
<div id="loadingBox" class="loading-box"><div class="spinner"></div><div>Loading DG COMP decisions...</div></div>
<div id="results"></div>

<div class="footer">
  Data: <a href="https://data.europa.eu" target="_blank">DG COMP Open Data</a><span class="sep">|</span>
  Court cases: <a href="https://infocuria.curia.europa.eu" target="_blank">InfoCuria</a> &amp;
  <a href="https://publications.europa.eu/en/web/cellar" target="_blank">EU CELLAR</a><span class="sep">|</span>
  <a href="https://www.digital-competition.com" target="_blank">digital-competition.com</a>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DG COMP ↔ ECJ/GC Case Linker — Enhanced Edition
// SPARQL via AllOrigins + InfoCuria links + Statistics
// ═══════════════════════════════════════════════════════════════

var CELLAR = "https://publications.europa.eu/webapi/rdf/sparql";
var PROXY = "https://api.allorigins.win/raw?url=";

var QUICK = ["Google","Apple","Microsoft","Intel","Qualcomm","Amazon","Meta","cartel","abuse","Art. 102","Art. 101"];
var PAGE_SIZE = 40;
var allCases = [], filtered = [], expandedCase = null;
var caseLawCache = {}, caseLoadingSet = {};
var currentPage = 0;

function $(id) { return document.getElementById(id); }

// ——— Quick filters ———
QUICK.forEach(function(t) {
  var p = document.createElement("button");
  p.className = "pill"; p.textContent = t;
  p.addEventListener("click", function() { $("searchInput").value = t; doFilter(); });
  $("quickFilters").appendChild(p);
});
$("btnSearch").addEventListener("click", doFilter);
$("searchInput").addEventListener("keydown", function(e) { if (e.key === "Enter") doFilter(); });
$("typeFilter").addEventListener("change", doFilter);

// ——— Load cases ———
function loadCaseData() {
  fetch("cases.json").then(function(r) {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }).then(function(d) {
    allCases = Array.isArray(d) ? d : (d.data || []);
    if (!allCases.length) throw new Error("No cases");
    $("loadingBox").style.display = "none";
    $("debugBar").style.display = "none";
    filtered = allCases;
    renderStats();
    render();
  }).catch(function(e) {
    $("debugBar").textContent = "Error: " + e.message;
    $("debugBar").style.background = "#fce4e4"; $("debugBar").style.color = "#8b1a1a";
  });
}

// ——— Statistics ———
function renderStats() {
  var antitrust = 0, cartel = 0, art101 = 0, art102 = 0;
  var years = {};
  allCases.forEach(function(c) {
    if (c.ct === "Antitrust") antitrust++;
    if (c.ct === "Cartel") cartel++;
    if (c.lb && c.lb.indexOf("101") !== -1) art101++;
    if (c.lb && c.lb.indexOf("102") !== -1) art102++;
    if (c.d) { var y = c.d.substring(0, 4); years[y] = (years[y] || 0) + 1; }
  });
  var recentYear = Object.keys(years).sort().pop();
  $("statsBar").innerHTML =
    '<div class="stat-card"><div class="stat-num">' + allCases.length + '</div><div class="stat-label">Total Decisions</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + antitrust + '</div><div class="stat-label">Antitrust</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + cartel + '</div><div class="stat-label">Cartel</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + art102 + '</div><div class="stat-label">Art. 102 TFEU</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + art101 + '</div><div class="stat-label">Art. 101 TFEU</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (years[recentYear] || 0) + '</div><div class="stat-label">In ' + recentYear + '</div></div>';
}

// ——— SPARQL (via AllOrigins proxy) ———
function buildQuery(caseNum, companies) {
  var n = caseNum.replace(/^AT\./, "").replace(/^COMP\//, "");
  var term = "";
  if (companies && companies.length) {
    var w = companies[0].split(/[\s,\/\(\)]+/).filter(function(x){return x.length>3;});
    if (w.length) term = w[0].toLowerCase().replace(/"/g,"");
  }
  var f = [];
  if (n) f.push('CONTAINS(STR(?t),"' + n + '")');
  if (term) f.push('(CONTAINS(LCASE(STR(?t)),"' + term + '")&&CONTAINS(LCASE(STR(?t)),"commission"))');
  if (!f.length) return null;

  return 'PREFIX cdm:<http://publications.europa.eu/ontology/cdm#> '
    + 'SELECT DISTINCT ?c ?t ?d WHERE {'
    + '?w cdm:work_has_resource-type ?ty.'
    + 'FILTER(?ty IN(<http://publications.europa.eu/resource/authority/resource-type/JUDG>,'
    + '<http://publications.europa.eu/resource/authority/resource-type/ORDER>,'
    + '<http://publications.europa.eu/resource/authority/resource-type/OPIN_AG>))'
    + '?e cdm:expression_belongs_to_work ?w.'
    + '?e cdm:expression_uses_language <http://publications.europa.eu/resource/authority/language/ENG>.'
    + '?e cdm:expression_title ?t.'
    + 'FILTER(' + f.join("||") + ')'
    + 'OPTIONAL{?w cdm:resource_legal_id_celex ?c.}'
    + 'OPTIONAL{?w cdm:work_date_document ?d.}'
    + '} ORDER BY DESC(?d) LIMIT 30';
}

function executeSparql(query) {
  var url = CELLAR + "?query=" + encodeURIComponent(query) + "&format=" + encodeURIComponent("application/sparql-results+json");
  var proxyUrl = PROXY + encodeURIComponent(url);

  return fetch(proxyUrl, { headers: { "Accept": "application/sparql-results+json" } })
    .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(function(d) {
      if (!d.results || !d.results.bindings) throw new Error("Bad response");
      return d.results.bindings.map(function(b) {
        var row = {}; Object.keys(b).forEach(function(k) { row[k] = b[k].value; }); return row;
      });
    });
}

function fetchCourtCases(cn) {
  var c = allCases.find(function(x) { return x.n === cn; });
  if (!c) return;
  caseLoadingSet[cn] = true; render();

  var q = buildQuery(cn, c.c || []);
  if (!q) { delete caseLoadingSet[cn]; caseLawCache[cn] = []; render(); return; }

  executeSparql(q).then(function(rows) {
    var seen = {}, unique = [];
    rows.forEach(function(r) {
      var obj = { celex: r.c, title: r.t, date: r.d };
      var key = obj.celex || obj.title;
      if (!seen[key]) { seen[key] = true; unique.push(obj); }
    });
    delete caseLoadingSet[cn]; caseLawCache[cn] = unique; render();
  }).catch(function(err) {
    console.warn("SPARQL failed for " + cn + ":", err.message);
    delete caseLoadingSet[cn]; caseLawCache[cn] = { error: err.message }; render();
  });
}

// ——— InfoCuria links ———
function infoCuriaLinks(caseNum, companies) {
  var n = caseNum.replace(/^AT\./, "").replace(/^COMP\//, "");
  var links = [];
  if (n) links.push({ label: "Search InfoCuria for " + caseNum, url: "https://infocuria.curia.europa.eu/tabs/affair?lang=en&searchTerm=%22" + encodeURIComponent(n) + "%22", cls: "primary" });
  if (companies && companies.length) {
    var w = companies[0].split(/[\s,\/\(\)]+/).filter(function(x){return x.length>2;});
    if (w.length) links.push({ label: w[0] + " v Commission", url: "https://infocuria.curia.europa.eu/tabs/affair?lang=en&searchTerm=%22" + encodeURIComponent(w[0]) + "%22+Commission", cls: "secondary" });
  }
  if (n) links.push({ label: "EUR-Lex", url: "https://eur-lex.europa.eu/search.html?scope=EURLEX&text=%22" + encodeURIComponent(n) + "%22&type=quick", cls: "secondary" });
  return links;
}

// ——— Case summary (from embedded data) ———
function caseSummary(c) {
  var parts = [];
  if (c.ct) parts.push(c.ct + " decision");
  if (c.d) parts.push("adopted on " + fmtDate(c.d));
  if (c.lb) parts.push("under " + c.lb);
  if (c.c && c.c.length) parts.push("involving " + c.c.join(", "));
  return parts.length ? parts.join(", ") + "." : "";
}

// ——— Filter ———
function doFilter() {
  var q = $("searchInput").value.trim().toLowerCase();
  var type = $("typeFilter").value;
  currentPage = 0; expandedCase = null;
  document.querySelectorAll(".pill").forEach(function(p) { p.classList.toggle("active", q && p.textContent.toLowerCase() === q); });
  filtered = allCases.filter(function(c) {
    if (type && c.ct !== type) return false;
    if (!q) return true;
    return [c.n, c.t, c.ct, c.lb].concat(c.c || []).join(" ").toLowerCase().indexOf(q) !== -1;
  });
  render();
}

// ——— Render ———
function render() {
  $("statusBar").style.display = filtered.length > 0 ? "flex" : "none";
  $("statusBar").innerHTML = '<span><strong>' + filtered.length + '</strong> of ' + allCases.length + ' cases</span><span style="color:#888;font-style:italic;">Click a row to find linked court cases</span>';

  if (!filtered.length && allCases.length) {
    $("results").innerHTML = '<div class="empty"><h2>No matching cases</h2><p>Try a different search term.</p></div>';
    return;
  }

  var start = currentPage * PAGE_SIZE, page = filtered.slice(start, start + PAGE_SIZE), html = "";

  page.forEach(function(c) {
    var isExp = expandedCase === c.n;
    var cases = caseLawCache[c.n];
    var isLd = !!caseLoadingSet[c.n];
    var arr = Array.isArray(cases) ? cases : [];
    var hasErr = cases && cases.error;

    html += '<div class="decision ' + (isExp ? "expanded" : "") + '">';
    html += '<div class="decision-row" onclick="toggleExpand(\'' + esc(c.n) + '\')">';
    html += '<div class="expand-arrow">&#9654;</div>';
    html += '<div class="case-num">' + h(c.n) + '</div>';
    html += '<div class="decision-info"><div class="decision-title">' + h(c.t) + '</div>';
    html += '<div class="decision-meta">';
    if (c.d) html += '<span>' + fmtDate(c.d) + '</span>';
    html += '<span class="tag ' + (c.ct === "Cartel" ? "tag-cartel" : "tag-antitrust") + '">' + h(c.ct) + '</span>';
    if (c.lb) html += '<span class="tag tag-lb">' + h(c.lb) + '</span>';
    if (c.c && c.c.length) html += '<span>' + h(c.c.slice(0,3).join(", ")) + (c.c.length > 3 ? "..." : "") + '</span>';
    html += '<a class="comp-link" href="https://competition-cases.ec.europa.eu/cases/' + encodeURIComponent(c.n) + '" target="_blank" onclick="event.stopPropagation()">DG COMP &#8599;</a>';
    if (arr.length) html += '<span style="color:#2e7d32;font-weight:600;">' + arr.length + ' court case' + (arr.length !== 1 ? "s" : "") + '</span>';
    html += '</div></div></div>';

    if (isExp) {
      html += '<div class="case-law-panel">';

      // Case summary
      var summary = caseSummary(c);
      if (summary) {
        html += '<div class="case-summary"><h4>Case Summary</h4>' + h(summary) + '</div>';
      }

      // Court cases from SPARQL
      html += '<div class="panel-header" style="margin-top:12px;">Linked ECJ / General Court Cases</div>';
      if (isLd) {
        html += '<div class="case-loading"><div class="mini-spinner"></div>Searching EU CELLAR...</div>';
      } else if (hasErr) {
        html += '<div class="no-cases">Could not query CELLAR automatically. Use the links below to search manually.</div>';
      } else if (arr.length === 0 && cases !== undefined) {
        html += '<div class="no-cases">No court cases found via CELLAR. The decision may not have been challenged yet, or try the manual search below.</div>';
      } else if (arr.length > 0) {
        arr.forEach(function(cc) {
          html += '<div class="court-case">';
          html += '<div class="court-title">' + h(cc.title || cc.celex || "Court case") + '</div>';
          html += '<div class="court-meta">';
          if (cc.celex) html += '<span class="court-celex">' + h(cc.celex) + '</span>';
          if (cc.date) html += '<span>' + fmtDate(cc.date) + '</span>';
          if (cc.celex) html += '<a class="eurlex-link" href="https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:' + encodeURIComponent(cc.celex) + '" target="_blank">EUR-Lex &#8599;</a>';
          if (cc.celex) {
            var caseId = cc.celex.replace(/^6/, "").replace(/^(\d{4})/, "");
            html += '<a class="eurlex-link" href="https://infocuria.curia.europa.eu/tabs/affair?lang=en&searchTerm=%22' + encodeURIComponent(cc.celex) + '%22" target="_blank">InfoCuria &#8599;</a>';
          }
          html += '</div></div>';
        });
      }

      // Manual search links (always shown)
      var links = infoCuriaLinks(c.n, c.c || []);
      html += '<div class="court-links">';
      links.forEach(function(lk) {
        html += '<a class="court-link-btn ' + lk.cls + '" href="' + lk.url + '" target="_blank" onclick="event.stopPropagation()">' + h(lk.label) + ' &#8599;</a>';
      });
      html += '</div>';

      html += '</div>';
    }
    html += '</div>';
  });

  // Pagination
  var tp = Math.ceil(filtered.length / PAGE_SIZE);
  if (tp > 1) {
    html += '<div class="pagination">';
    html += '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage === 0 ? "disabled" : "") + '>Prev</button>';
    for (var i = Math.max(0, currentPage-4); i < Math.min(tp, currentPage+5); i++)
      html += '<button class="page-btn ' + (i === currentPage ? "active" : "") + '" onclick="goPage(' + i + ')">' + (i+1) + '</button>';
    html += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage >= tp-1 ? "disabled" : "") + '>Next</button>';
    html += '</div>';
  }
  $("results").innerHTML = html;
}

function goPage(p) { var tp = Math.ceil(filtered.length/PAGE_SIZE); if (p<0||p>=tp) return; currentPage=p; expandedCase=null; render(); window.scrollTo(0,0); }
function toggleExpand(cn) {
  if (expandedCase === cn) { expandedCase = null; }
  else { expandedCase = cn; if (caseLawCache[cn] === undefined) fetchCourtCases(cn); }
  render();
}

function h(s) { return s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : ""; }
function esc(s) { return s ? s.replace(/'/g,"\\'") : ""; }
function fmtDate(d) { try { return new Date(d).toLocaleDateString("en-GB",{year:"numeric",month:"short",day:"numeric"}); } catch(e) { return d; } }

loadCaseData();
</script>
</body>
</html>
